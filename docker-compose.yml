services:
  dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: dashboard
    restart: unless-stopped
    environment:
      - DASHBOARD__OTLP__AUTHMODE=ApiKey
      - DASHBOARD__OTLP__PRIMARYAPIKEY=104293fef88930cf3c41f27f762d58f5
    # Healthcheck disabled - Dashboard container lacks wget/curl tools
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -q --spider http://localhost:18888 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17.0
    container_name: postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - ./Deployment/Scripts/postgres-init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - eshop-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4.7
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - eshop_redis:/data
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
      RABBITMQ_DEFAULT_VHOST: "eshop01012025"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tenancy:
    image: ${DOCKER_REGISTRY-}eshop/tenancy
    container_name: tenancy
    restart: unless-stopped
    build:
      context: .
      dockerfile: Tenancy/src/EShop.Tenancy.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Username=tenancy;Password=tenancy-password-dev;Server=postgres;Port=5432;Database=eshop_tenancy
      - RedisOptions__Enabled=true
      - RedisOptions__Host=redis:6379
      - MasstransitConfiguration__Host=rabbitmq
      - MasstransitConfiguration__Port=5672
      - MasstransitConfiguration__VirtualHost=eshop01012025
      - MasstransitConfiguration__Username=guest
      - MasstransitConfiguration__Password=guest
      - Services__Authorization=http://authorization:8080
      - OTEL_SERVICE_NAME=tenancy-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      dashboard:
        condition: service_started
    secrets:
      - tenancy_db_password
      - jwt_secret
    env_file:
      - ./common.env
      - ./open-telemetry.env
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  authorization:
    image: ${DOCKER_REGISTRY-}eshop/authorization
    container_name: authorization
    restart: unless-stopped
    build:
      context: .
      dockerfile: Authorization/src/EShop.Authorization.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Username=authorization;Password=authorization-password-dev;Server=postgres;Port=5432;Database=eshop_authorization
      - RedisOptions__Enabled=true
      - RedisOptions__Host=redis:6379
      - MasstransitConfiguration__Host=rabbitmq
      - MasstransitConfiguration__Port=5672
      - MasstransitConfiguration__VirtualHost=eshop01012025
      - MasstransitConfiguration__Username=guest
      - MasstransitConfiguration__Password=guest
      - Services__Tenancy=http://tenancy:8080
      - OTEL_SERVICE_NAME=authorization-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      dashboard:
        condition: service_started
    secrets:
      - authorization_db_password
      - jwt_secret
    env_file:
      - ./common.env
      - ./open-telemetry.env
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  eshop.apigateway:
    image: ${DOCKER_REGISTRY-}eshop/apigateway
    container_name: apigateway
    restart: unless-stopped
    build:
      context: .
      dockerfile: ReverseProxy/src/EShop.ApiGateway/Dockerfile
    environment:
      - RedisOptions__Enabled=true
      - RedisOptions__Host=redis:6379
      - OTEL_SERVICE_NAME=api-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      tenancy:
        condition: service_started
      authorization:
        condition: service_started
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started
    secrets:
      - jwt_secret
    env_file:
      - ./common.env
      - ./open-telemetry.env
    networks:
      - eshop
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  eshop-data:
  eshop_redis:
  rabbitmq_data:

secrets:
  postgres_password:
    file: ./Deployment/secrets/postgres_password.txt
  tenancy_db_password:
    file: ./Deployment/secrets/tenancy_db_password.txt
  authorization_db_password:
    file: ./Deployment/secrets/authorization_db_password.txt
  rabbitmq_password:
    file: ./Deployment/secrets/rabbitmq_password.txt
  jwt_secret:
    file: ./Deployment/secrets/jwt_secret.txt

networks:
  eshop:
    name: eshop
    driver: bridge

