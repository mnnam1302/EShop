# =============================================================================
# Application services — production environment.
#
# Identical security model as dev.yml — same secret targets, same network
# assignments. No port bindings (traffic enters via reverse proxy only).
# Images are versioned via IMAGE_TAG from the env file.
#
# Usage (from solution root):
#   docker compose \
#     -f deploy/docker/docker-compose.infrastructure.yml \
#     -f deploy/docker/docker-compose.prod.yml \
#     --env-file deploy/env/prod.env \
#     up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Tenancy service
  # ---------------------------------------------------------------------------
  tenancy:
    image: ${DOCKER_REGISTRY-}eshop/tenancy:${IMAGE_TAG:-latest}
    container_name: tenancy
    restart: unless-stopped
    environment:
      # Non-sensitive config only — no credentials here.
      - ASPNETCORE_ENVIRONMENT=Production
      - RedisOptions__Enabled=true
      - MasstransitConfiguration__Host=rabbitmq
      - MasstransitConfiguration__Port=5672
      - MasstransitConfiguration__VirtualHost=${RABBITMQ_VHOST}
      - MasstransitConfiguration__Username=${RABBITMQ_USER}
      - Services__Authorization=http://authorization:8080
      - OTEL_SERVICE_NAME=tenancy-api
    secrets:
      - source: tenancy_connstr
        target: ConnectionStrings__DefaultConnection
      - source: rabbitmq_password
        target: MasstransitConfiguration__Password
      - source: redis_connstr
        target: RedisOptions__ConnectionString
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      dashboard:
        condition: service_started
    env_file:
      - ../env/prod.env
    networks:
      - eshop-public
      - eshop-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Authorization service
  # ---------------------------------------------------------------------------
  authorization:
    image: ${DOCKER_REGISTRY-}eshop/authorization:${IMAGE_TAG:-latest}
    container_name: authorization
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - RedisOptions__Enabled=true
      - MasstransitConfiguration__Host=rabbitmq
      - MasstransitConfiguration__Port=5672
      - MasstransitConfiguration__VirtualHost=${RABBITMQ_VHOST}
      - MasstransitConfiguration__Username=${RABBITMQ_USER}
      - Services__Tenancy=http://tenancy:8080
      - OTEL_SERVICE_NAME=authorization-api
    secrets:
      - source: authorization_connstr
        target: ConnectionStrings__DefaultConnection
      - source: rabbitmq_password
        target: MasstransitConfiguration__Password
      - source: redis_connstr
        target: RedisOptions__ConnectionString
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      dashboard:
        condition: service_started
    env_file:
      - ../env/prod.env
    networks:
      - eshop-public
      - eshop-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API Gateway — edge service, no port binding (reverse proxy handles ingress).
  # ---------------------------------------------------------------------------
  eshop.apigateway:
    image: ${DOCKER_REGISTRY-}eshop/apigateway:${IMAGE_TAG:-latest}
    container_name: apigateway
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - RedisOptions__Enabled=true
      - Services__tenancy__http__0=http://tenancy:8080
      - Services__authorization__http__0=http://authorization:8080
      - OTEL_SERVICE_NAME=api-gateway
    secrets:
      - source: redis_connstr
        target: RedisOptions__ConnectionString
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      tenancy:
        condition: service_started
      authorization:
        condition: service_started
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started
    env_file:
      - ../env/prod.env
    networks:
      - eshop-public
      - eshop-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  tenancy_connstr:
    file: ../secrets/tenancy_connstr.txt
  authorization_connstr:
    file: ../secrets/authorization_connstr.txt
  rabbitmq_password:
    file: ../secrets/rabbitmq_password.txt
  redis_connstr:
    file: ../secrets/redis_connstr.txt

networks:
  eshop-public:
    external: true
  eshop-internal:
    external: true
