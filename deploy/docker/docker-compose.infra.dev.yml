# =============================================================================
# Infrastructure services — LOCAL DEVELOPMENT ONLY.
#
# Intentionally simple:
#   - Plain environment variable credentials (no Docker secrets).
#   - All ports exposed for local tooling (pgAdmin, RedisInsight, etc.).
#   - No resource limits — do not constrain the developer's machine.
#   - No internal: true restriction — containers may reach the internet.
#
# For secure production infrastructure, see docker-compose.infra.prod.yml.
#
# Usage (infrastructure only):
#   docker compose -f deploy/docker/docker-compose.infra.dev.yml up -d
#
# Usage (microsevices and infrastructure):
#   docker compose -f deploy/docker/docker-compose.infra.dev.yml -f deploy/docker/docker-compose.dev.yml up -d
#
# Usage commands
# - docker compose -f deploy/docker/docker-compose.infra.dev.yml up <service-name> -d
# - docker compose -f deploy/docker/docker-compose.infra.dev.yml down -v <service-name>
#
# =============================================================================

services:
  # PostgreSQL
  postgres:
    image: postgres:17.0
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ../env/dev.env
    volumes:
      - ../postgres/init-scripts/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - eshop-data:/var/lib/postgresql/data
    command: postgres -c 'max_connections=200'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-internal

  # Postgres Exporter - connect monitor_user (pg_monitor role, granted in postgres-init.sql)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://monitor_user:monitor-password-dev@postgres:5432/eshop_tenancy?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-internal

  # Redis
  redis:
    image: redis:7.4.7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - eshop-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-internal

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0-alpine
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - eshop-internal

  # RabbitMQ — rabbitmq_prometheus plugin enabled via enabled_plugins mount, exposes /metrics on 15692 for Prometheus.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file:
      - ../env/dev.env
    volumes:
      - eshop-rabbitmq:/var/lib/rabbitmq
      - ../config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    networks:
      - eshop-internal

  # MongoDB
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - ../env/dev.env
    volumes:
      - ../scripts/mongodb-init.js:/docker-entrypoint-initdb.d/1-init.js:ro
      - eshop-mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "catalog", "-p", "catalog-dev",
            "--authenticationDatabase", "eshop-catalog",
            "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-internal

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  # Aspire Dashboard — receives OTLP traces/logs/metrics from the collector and services, and serves the UI.
  dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: dashboard
    restart: unless-stopped
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: "Unsecured"
      DASHBOARD__OTLP__AUTHMODE: "ApiKey"
      DASHBOARD__OTLP__PRIMARYAPIKEY: "eshop-dev-otlp-key"
    ports:
      - "18888:18888"   # dashboard UI (anonymous)
      - "18889:18889"   # OTLP ingest (gRPC) — requires API key
    networks:
      - eshop-internal

  # OpenTelemetry Collector
  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.135.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      ASPIRE_ENDPOINT: "http://dashboard:18889"
      ASPIRE_API_KEY: "eshop-dev-otlp-key"
      ASPIRE_INSECURE: "true"
    volumes:
      - ../config/otelcollector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    depends_on:
      dashboard:
        condition: service_started
    networks:
      - eshop-internal

  # Prometheus — scrapes the collector, node-exporter, postgres-exporter, redis-exporter and rabbitmq (rabbitmq_prometheus plugin).
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../config/prometheus/prometheus_pull.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - eshop-internal

  # Node Exporter — host-level metrics for Prometheus.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - eshop-internal

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - eshop-internal

volumes:
  eshop-data:
  eshop-redis:
  eshop-rabbitmq:
  eshop-mongodb:

# Networks are created by this file so a fresh clone needs no manual `docker network create`.
networks:
  eshop-public:
    name: eshop-public
  eshop-internal:
    name: eshop-internal
