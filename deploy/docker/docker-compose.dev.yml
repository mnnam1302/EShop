    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API Gateway — edge service (routes to tenancy + authorization).
  # ---------------------------------------------------------------------------
  eshop.apigateway:
    restart: unless-stopped
    env_file:
      - ../env/dev.env
    networks:
      - eshop-public
      - eshop-internal
    image: ${DOCKER_REGISTRY-}eshop/apigateway
    container_name: apigateway
    build:
      context: ../..
      dockerfile: ReverseProxy/src/EShop.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RedisOptions__Enabled: "true"
      RedisOptions__Host: "redis:6379"
      Services__tenancy__http__0: "http://tenancy:8080"
      Services__authorization__http__0: "http://authorization:8080"
      OTEL_SERVICE_NAME: api-gateway
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      tenancy:
        condition: service_started
      authorization:
        condition: service_started
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started

networks:
  eshop-public:
    name: eshop-public
  eshop-internal:
    name: eshop-internal
