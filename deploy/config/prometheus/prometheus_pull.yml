global:
  scrape_interval: 15s

scrape_configs:
  # Keep this for Prometheus to monitor itself. Without it you cannot alert on "Prometheus is down".
  - job_name: eshop-prometheus
    scrape_interval: 5s
    static_configs:
      - targets: ['prometheus:9090'] # can replace container name with host.docker.internal
  
  - job_name: otel-collector
    scrape_interval: 5s
    static_configs:
      - targets: ['otel-collector:8889']  # container name + exporter port
    metrics_path: /metrics                # default, explicit for clarity

  - job_name: node-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
